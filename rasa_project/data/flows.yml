flows:
  # ─────────────────────────────────────────────────────────────────
  # confirm_booking — happy path
  # Entry: programmatic `/confirm_booking` with metadata.booking
  # containing {venue_id, date, time, party_size, deposit_gbp}.
  #
  # ActionValidateBooking reads the metadata, sets slots, and
  # populates `validation_error` (either with a reason string or null).
  # The `next:` block branches on that slot.
  # ─────────────────────────────────────────────────────────────────
  confirm_booking:
    description: Confirm a new pub booking after validating party size and deposit.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  # ─────────────────────────────────────────────────────────────────
  # resume_from_loop — programmatic re-entry from the loop half.
  # Collects missing slots (if any), then links into confirm_booking.
  # In normal flow, the loop half handoff already populates metadata,
  # so the collect: steps are a safety net rather than a real prompt
  # (programmatic triggering bypasses user input).
  # ─────────────────────────────────────────────────────────────────
  resume_from_loop:
    description: Resume booking confirmation when handed off from the loop half.
    steps:
      - collect: venue_id
      - collect: date
      - collect: time
      - collect: party_size
      - collect: deposit_gbp
      - link: confirm_booking

  # ─────────────────────────────────────────────────────────────────
  # request_research — bounces control BACK to the loop half.
  # ─────────────────────────────────────────────────────────────────
  request_research:
    description: Return control to the research agent for an alternative venue.
    steps:
      - action: utter_returning_to_research
        next: END
